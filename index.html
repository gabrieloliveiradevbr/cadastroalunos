<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="assets/css/template.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_right_alt" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="local-selecionado">
                <div class="local-selecionado-info">
                    <div class="local">Aluno</div>
                    <div class="acao">Cadastro</div>
                </div>
            </div>
            <div class="atalho">
                <div class="atalho-info">
                    <div class="area-secretaria"><a href="#">Secretaria</a></div>
                    <span id="seta" class="material-symbols-outlined">
                        arrow_right_alt
                    </span>
                    <div class="area-aluno"><a href="#">Aluno</a></div>
                </div>
            </div>
        </div>
    </header>

    <section class="main-content">
        <div class="container">
            <div class="geral">

                <div class="aluno-info">
                    <div class="aluno-info-foto">
                        <img src="assets/images/perfil-png.webp" alt="Foto do aluno">
                    </div>
                    <div class="aluno-info-nome">
                        <h1>Nome do Aluno</h1>
                    </div>
                    <div class="aluno-info-matricula">
                        <p>Matrícula: 123456789</p>
                    </div>
                    <div class="aluno-info-status">
                        <p>Status: Ativo</p>
                    </div>
                    <div class="aluno-info-acoes">
                        <button type="button">Editar</button>
                        <button type="button">Excluir</button>
                    </div>
                </div>

                <div class="aluno-info-dados">
                    <div class="informations">

                        <form method="POST" action="/salvar-aluno">

                            <h2>Dados Pessoais</h2>
                            <div class="input-group">
                                <div class="input-title">
                                    <label for="nome">Nome completo</label>
                                    <input type="text" id="nome" name="nome" required>
                                </div>

                                <div class="input-title">
                                    <label for="cpf">CPF</label>
                                    <input type="text" id="cpf" name="cpf" pattern="\d{11}" placeholder="Apenas números" required>
                                </div>
                            </div>
                            <h2>Dados Acadêmicos</h2>

                            <div class="input-group">
                                <div class="input-title">
                                    <label for="matricula">Matrícula</label>
                                    <input type="text" id="matricula" name="matricula" required>
                                </div>

                                <div class="input-title">
                                    <label for="ano_letivo">Ano letivo</label>
                                    <input type="number" id="ano_letivo" name="ano_letivo" required>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="input-title">
                                    <label for="serie">Série/Ano</label>
                                    <select id="serie" name="serie" required>
                                        <option value="1">1º Ano</option>
                                        <option value="2">2º Ano</option>
                                        <option value="3">3º Ano</option>
                                    </select>
                                </div>

                                <div class="input-title">
                                    <label for="turma">Turma</label>
                                    <input type="text" id="turma" name="turma" required>
                                </div>
                            </div>

                            <div class="input-group">
                                <div class="input-title">
                                    <label for="turno">Turno</label>
                                    <select id="turno" name="turno" required>
                                        <option value="manha">Manhã</option>
                                        <option value="tarde">Tarde</option>
                                        <option value="noite">Noite</option>
                                    </select>
                                </div>

                                <div class="input-title">
                                    <label for="modalidade">Modalidade</label>
                                    <select id="modalidade" name="modalidade" required>
                                        <option>Ensino Fundamental</option>
                                        <option>Ensino Médio</option>
                                        <option>EJA</option>
                                    </select>
                                </div>
                            </div>

                            <h2>Situação Escolar</h2>

                            <div class="input-group">
                                <div class="input-title">
                                    <label for="situacao">Situação</label>
                                    <select id="situacao" name="situacao" required>
                                        <option>Ativo</option>
                                        <option>Transferido</option>
                                        <option>Evadido</option>
                                        <option>Concluído</option>
                                    </select>
                                </div>

                                <div class="input-title">
                                    <label for="data_matricula">Data da matrícula</label>
                                    <input type="date" id="data_matricula" name="data_matricula" required>
                                </div>
                            </div>

                            <h2>Contato</h2>

                            <div class="input-group">
                                <div class="input-title">
                                    <label for="telefone">Telefone</label>
                                    <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX" required>
                                </div>

                                <div class="input-title">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" name="email" placeholder="Email do aluno" required>
                                </div>
                            </div>

                            <button type="submit">Salvar</button>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container footer-content">
            <div class="footer-left">
                <p>Sistema Escolar • Escola Exemplo</p>
            </div>

            <div class="footer-center">
                <p>© 2026 - Todos os direitos reservados</p>
            </div>

            <div class="footer-right">
                <p>Versão 1.0</p>
            </div>
        </div>
    </footer>

</body>
</html>
